name: Release & Docker Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get version from tag
      id: tag_name
      run: |
        echo "current_version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Changelog builder
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Create Release Notes
      run: |
        echo "## 🎉 Release ${{ steps.tag_name.outputs.current_version }}" > release_notes.md
        echo "" >> release_notes.md
        echo "### Features & Updates" >> release_notes.md
        echo "- Production-ready deployment" >> release_notes.md
        echo "- Enhanced security measures" >> release_notes.md
        echo "- Improved performance" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Build Info" >> release_notes.md
        echo "- Build: ${{ github.run_number }}" >> release_notes.md
        echo "- Commit: ${{ github.sha }}" >> release_notes.md
        echo "- Date: $(date)" >> release_notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Publish to npm (optional)
      run: |
        echo "Optional: Configure npm publishing in secrets"
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' }}
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

  performance:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Performance checks
      run: |
        echo "📊 Application Size Check"
        du -sh .
        echo ""
        echo "📦 Node Modules Size"
        du -sh node_modules
        echo ""
        echo "✅ Performance baseline established"
