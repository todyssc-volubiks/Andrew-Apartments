name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate API Documentation
      run: |
        mkdir -p docs/public
        echo "# API Documentation" > docs/public/api.html
        cat << 'EOF' > docs/public/index.html
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Andrew Apartments - Documentation</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              line-height: 1.6;
              color: #333;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              min-height: 100vh;
            }
            .container {
              max-width: 1200px;
              margin: 0 auto;
              padding: 40px 20px;
            }
            header {
              background: white;
              padding: 40px;
              border-radius: 8px;
              margin-bottom: 40px;
              box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            header h1 {
              color: #667eea;
              margin-bottom: 10px;
            }
            .grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
              gap: 20px;
            }
            .card {
              background: white;
              padding: 30px;
              border-radius: 8px;
              box-shadow: 0 4px 6px rgba(0,0,0,0.1);
              transition: transform 0.3s;
            }
            .card:hover {
              transform: translateY(-5px);
              box-shadow: 0 8px 12px rgba(0,0,0,0.15);
            }
            .card h2 {
              color: #667eea;
              margin-bottom: 15px;
            }
            .card p {
              color: #666;
              margin-bottom: 15px;
            }
            .card a {
              color: #667eea;
              text-decoration: none;
              font-weight: 600;
            }
            .card a:hover {
              text-decoration: underline;
            }
            footer {
              text-align: center;
              color: white;
              margin-top: 40px;
              padding: 20px;
            }
          </style>
        </head>
        <body>
          <div class="container">
            <header>
              <h1>🏠 Andrew Apartments</h1>
              <p>Real Estate Management Platform - Project Documentation</p>
            </header>
            
            <div class="grid">
              <div class="card">
                <h2>📚 Getting Started</h2>
                <p>Learn how to set up and run the Andrew Apartments application.</p>
                <a href="#quickstart">View Quick Start Guide →</a>
              </div>
              
              <div class="card">
                <h2>🛠️ Installation</h2>
                <p>Step-by-step guide to install dependencies and configure the application.</p>
                <a href="https://github.com/todyssc-volubiks/Andrew-Apartments#installation">View Installation →</a>
              </div>
              
              <div class="card">
                <h2>📖 API Reference</h2>
                <p>Complete API documentation and endpoint specifications.</p>
                <a href="#api">View API Docs →</a>
              </div>
              
              <div class="card">
                <h2>🚀 Deployment</h2>
                <p>Deploy Andrew Apartments to production environments.</p>
                <a href="#deployment">View Deployment Guide →</a>
              </div>
              
              <div class="card">
                <h2>🔗 Repository</h2>
                <p>Visit the GitHub repository for source code and contributions.</p>
                <a href="https://github.com/todyssc-volubiks/Andrew-Apartments">GitHub Repository →</a>
              </div>
              
              <div class="card">
                <h2>📝 Scripts</h2>
                <p>Available npm scripts and commands for development and production.</p>
                <a href="https://github.com/todyssc-volubiks/Andrew-Apartments/blob/main/SCRIPTS.md">View Scripts →</a>
              </div>
            </div>
            
            <footer>
              <p>&copy; 2026 Andrew Apartments. All rights reserved.</p>
              <p>Built with ❤️ using Node.js, Express, and EJS</p>
            </footer>
          </div>
        </body>
        </html>
        EOF
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs/public'
  
  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
