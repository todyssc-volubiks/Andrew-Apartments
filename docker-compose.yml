version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: andrew-apartments
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - SESSION_SECRET=your-session-secret-key
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: sqlite:latest
    container_name: andrew-apartments-db
    volumes:
      - db-data:/data
    environment:
      - SQLITE_ENABLE_URI_FILENAME=1
    networks:
      - app-network
    restart: unless-stopped

volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge
